name: byob

services:
  postgres:
    image: postgres:16
    container_name: byob-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-byob}
      POSTGRES_USER: ${POSTGRES_USER:-byob}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-byob}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7
    container_name: byob-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  qdrant:
    image: qdrant/qdrant:v1.17.1
    container_name: byob-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/6333; printf \"GET /healthz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3; grep -q \"healthz check passed\" <&3'",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio:
    image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: byob-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  embedding:
    image: ${INFINITY_IMAGE:-michaelf34/infinity:latest-cpu}
    container_name: byob-embedding
    restart: unless-stopped
    command:
      [
        "v2",
        "--model-id",
        "${EMBEDDING_MODEL:-BAAI/bge-m3}",
        "--engine",
        "torch",
        "--port",
        "7997",
      ]
    environment:
      HF_HOME: /app/.cache/huggingface
      DO_NOT_TRACK: "1"
    ports:
      - "${EMBEDDING_PORT:-7997}:7997"
    volumes:
      - embedding_cache:/app/.cache
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import json, urllib.request; req=urllib.request.Request('http://localhost:7997/embeddings', data=json.dumps({'model':'${EMBEDDING_MODEL:-BAAI/bge-m3}','input':['health check']}).encode(), headers={'Content-Type':'application/json'}); urllib.request.urlopen(req, timeout=30).read()\"",
        ]
      interval: 30s
      timeout: 35s
      retries: 20
      start_period: 120s

  rerank:
    image: ${INFINITY_IMAGE:-michaelf34/infinity:latest-cpu}
    container_name: byob-rerank
    restart: unless-stopped
    command:
      [
        "v2",
        "--model-id",
        "${RERANK_MODEL:-BAAI/bge-reranker-base}",
        "--engine",
        "torch",
        "--port",
        "7998",
      ]
    environment:
      HF_HOME: /app/.cache/huggingface
      DO_NOT_TRACK: "1"
    ports:
      - "${RERANK_PORT:-7998}:7998"
    volumes:
      - rerank_cache:/app/.cache
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import json, urllib.request; req=urllib.request.Request('http://localhost:7998/rerank', data=json.dumps({'model':'${RERANK_MODEL:-BAAI/bge-reranker-base}','query':'health','documents':['health check']}).encode(), headers={'Content-Type':'application/json'}); urllib.request.urlopen(req, timeout=30).read()\"",
        ]
      interval: 30s
      timeout: 35s
      retries: 20
      start_period: 120s

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:
  embedding_cache:
  rerank_cache:
